services:
  sermulher-frontend:
    container_name: sermulher_frontend
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # URL Pública do Directus (usada pelo navegador do cliente)
        - NEXT_PUBLIC_DIRECTUS_URL=https://fluxo.sermulher.aracaju.se.gov.br/api-directus
        # Nota: Se o directus não tiver domínio público, mantenha o IP: http://192.168.0.115:8055
        # Mas idealmente ele deveria ser acessível publicamente para imagens carregarem.

    restart: always
    ports:
      - "3002:3000"
    environment:
      - NODE_ENV=production
      # Comunicação Interna (Container -> Container) via nome da rede
      - DIRECTUS_API_URL=http://direcuts_sermulher-directus-1:8055
      - DIRECTUS_TOKEN=j8EbY77uaPAhN0ZnGrDvoQI9VUGTvl_7
      - AUTH_SECRET=j8EbY77uaPAhN0ZnGrDvoQI9VUGTvl_7
      - NEXT_PUBLIC_APP_URL=https://fluxo.sermulher.aracaju.se.gov.br

    # Conecta APENAS na rede do Directus (onde o Traefik também está)
    networks:
      - default_net

    labels:
      - "traefik.enable=true"
      # Força o Traefik a usar essa rede específica para achar o container
      - "traefik.docker.network=direcuts_sermulher_directus_net"

      # Regra de Roteamento
      - "traefik.http.routers.sermulher.rule=Host(`fluxo.sermulher.aracaju.se.gov.br`)"
      - "traefik.http.routers.sermulher.entrypoints=websecure"
      - "traefik.http.routers.sermulher.tls=true"
      # Nome exato do resolver encontrado no seu arquivo do Traefik
      - "traefik.http.routers.sermulher.tls.certresolver=leresolver"

      # Porta interna da aplicação
      - "traefik.http.services.sermulher.loadbalancer.server.port=3000"

networks:
  default_net:
    external: true
    name: direcuts_sermulher_directus_net
