services:
  sermulher-frontend:
    container_name: sermulher_frontend
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # URL Pública do Directus (acessível pelo navegador do usuário)
        - NEXT_PUBLIC_DIRECTUS_URL=http://192.168.0.115:8055
    restart: always
    ports:
      - "3002:3000" # Host:3002 -> Container:3000
    environment:
      - NODE_ENV=production
      # Comunicação interna (Server Side)
      # Usamos o IP do host para garantir acesso ao Directus na porta 8055
      - DIRECTUS_API_URL=http://192.168.0.115:8055
      - DIRECTUS_TOKEN=j8EbY77uaPAhN0ZnGrDvoQI9VUGTvl_7
      - AUTH_SECRET=j8EbY77uaPAhN0ZnGrDvoQI9VUGTvl_7
      # URL da aplicação (importante para redirecionamentos)
      - NEXT_PUBLIC_APP_URL=http://192.168.0.115:3002

    # Permite que o container acesse o IP do host (Linux)
    extra_hosts:
      - "host.docker.internal:host-gateway"
