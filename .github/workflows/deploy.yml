name: Deploy Produção (On-Premise)

on:
  # Dispara automaticamente ao commitar na main
  push:
    branches: ["main"]
  # Permite disparar manualmente pela aba Actions do GitHub se necessário
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy
    runs-on: self-hosted

    steps:
      - name: 📥 Checkout do Código
        uses: actions/checkout@v4

      - name: 🔐 Gerar .env de Produção
        run: |
          echo "# Arquivo gerado automaticamente pelo GitHub Actions" > .env
          echo "NODE_ENV=production" >> .env
          echo "DIRECTUS_API_URL=${{ secrets.DIRECTUS_API_URL }}" >> .env
          echo "DIRECTUS_TOKEN=${{ secrets.DIRECTUS_TOKEN }}" >> .env
          echo "AUTH_SECRET=${{ secrets.AUTH_SECRET }}" >> .env
          echo "NEXT_PUBLIC_APP_URL=${{ secrets.NEXT_PUBLIC_APP_URL }}" >> .env
          echo "NEXT_PUBLIC_DIRECTUS_URL=${{ secrets.NEXT_PUBLIC_DIRECTUS_URL }}" >> .env
          # Configuração do Traefik (se necessário no futuro)
          echo "DOMAIN=fluxo.sermulher.aracaju.se.gov.br" >> .env

      - name: 🐳 Docker Compose Deploy
        run: |
          echo "🔄 Reiniciando containers..."
          # Derruba containers antigos para garantir limpeza
          docker compose down --remove-orphans

          # Reconstrói a imagem (Build) e sobe em background (-d)
          docker compose up -d --build

      - name: 🧹 Limpeza de Imagens Antigas
        run: |
          docker image prune -f
          echo "✅ Deploy finalizado com sucesso!"
