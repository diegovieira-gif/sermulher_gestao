name: CI (Quality + Smoke Tests)

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  quality:
    name: Type Check + Lint (PR Gate)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # Gate bloqueante: erros de tipo NÃO passam mais despercebidos.
      # (o `ignoreBuildErrors` do next.config foi removido — este é o guarda de regressão)
      - name: Type check
        run: npx tsc --noEmit

      # Informativo por ora: o repo ainda tem findings pré-existentes de lint.
      # Endureça para bloqueante conforme a dívida de `any` for zerada.
      - name: Lint
        run: npx eslint src
        continue-on-error: true

  smoke:
    name: Smoke Tests (PR Gate)
    runs-on: ubuntu-latest
    needs: quality
    timeout-minutes: 20

    env:
      BASE_URL: http://localhost:3000
      # Build-time: baked no bundle client (substitua pelo valor real no Coolify)
      NEXT_PUBLIC_DIRECTUS_URL: ${{ secrets.NEXT_PUBLIC_DIRECTUS_URL || 'http://localhost:8055' }}
      # Runtime: usados pelo servidor Next.js nos testes
      DIRECTUS_URL: ${{ secrets.DIRECTUS_URL || 'http://localhost:8055' }}
      DIRECTUS_TOKEN: ${{ secrets.DIRECTUS_TOKEN }}
      AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
      AUTH_URL: http://localhost:3000
      AUTH_TRUST_HOST: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      # Cache do build do Next.js — economiza ~1-2min por run
      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('package-lock.json') }}-${{ hashFiles('src/**/*.ts', 'src/**/*.tsx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('package-lock.json') }}-
            ${{ runner.os }}-nextjs-

      - name: Install dependencies
        run: npm ci

      # Detecta versão do Playwright para chave de cache precisa
      - name: Get Playwright version
        id: pw-version
        run: echo "version=$(npm ls @playwright/test --json | jq -r '.dependencies["@playwright/test"].version')" >> $GITHUB_OUTPUT

      # Cache dos binários dos browsers — economiza ~1min por run
      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.pw-version.outputs.version }}

      - name: Install Playwright browsers (se não cacheados)
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system deps (se browsers cacheados)
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      # Build com variável pública injetada (necessário antes de `next start`)
      - name: Build Next.js
        run: npm run build
        env:
          NEXT_PUBLIC_DIRECTUS_URL: ${{ env.NEXT_PUBLIC_DIRECTUS_URL }}

      # Roda apenas os smoke tests — rápido, sem tocar no banco de produção
      - name: Run smoke tests
        run: npx playwright test --project=smoke

      - name: Upload report (em falha)
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
